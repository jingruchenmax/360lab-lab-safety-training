name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      SKIP_ENV_VALIDATION: "1"
      NEXT_PUBLIC_MATTERPORT_MODEL_ID: ${{ vars.NEXT_PUBLIC_MATTERPORT_MODEL_ID }}
      MATTERPORT_API_TOKEN: ${{ secrets.MATTERPORT_API_TOKEN }}
      MATTERPORT_API_SECRET: ${{ secrets.MATTERPORT_API_SECRET }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build static site
        run: pnpm build

      - name: Deploy to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: ./out
          force_orphan: true
